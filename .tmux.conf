# ~/.tmux.conf

##### Prefix and keybindings ###################################################

set -g prefix C-a
unbind C-b
bind C-a send-prefix

bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"

# Splits and navigation
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

##### Behavior #################################################################

set -s escape-time 1
set -g repeat-time 500
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g display-time 2500
set -g status-interval 5
set -g focus-events on
set -g detach-on-destroy off
set -g allow-passthrough on

set -g mouse off
set -g mode-keys vi
set -g set-clipboard on

# Keep new panes/windows in the current working directory.
bind c new-window -c "#{pane_current_path}"

# macOS clipboard integration for vi copy mode.
if-shell -b 'command -v pbcopy >/dev/null 2>&1' \
  'bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"'
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle

##### Terminal #################################################################

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB,alacritty:RGB,ghostty:RGB,wezterm:RGB,kitty:RGB"
set -as terminal-overrides ",xterm-256color:Tc"

##### Theme ####################################################################

set -g status on
set -g status-position bottom
set -g status-justify centre
set -g pane-border-status off
set -g pane-border-lines single

set -g window-style "fg=default,bg=default"
set -g window-active-style "fg=default,bg=default"

##### Plugins ##################################################################

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @tmux-gruvbox 'dark'
set -g @tmux-gruvbox-left-status-a ''
set -g @tmux-gruvbox-right-status-x ''
set -g @tmux-gruvbox-right-status-y ''
set -g @tmux-gruvbox-right-status-z '#H'

run '~/.tmux/plugins/tpm/tpm'

# Keep the Gruvbox palette from the plugin, but make the bar sparse and plain.
set -g status-justify centre
set -g status-left ''
set -g status-left-length 0
set -g status-right '#H '
set -g status-right-length 40
set -g window-status-separator '  '
set -g window-status-style 'fg=default,bg=default'
set -g window-status-current-style 'fg=colour235,bg=colour172,bold'
set -g window-status-format ' #I:#W#{?window_flags,#{window_flags},} '
set -g window-status-current-format ' #I:#W#{?window_flags,#{window_flags},} '

# Re-assert personal prefix bindings after plugins finish loading.
bind -r C-h select-window -t :-
bind -r C-l select-window -t :+
